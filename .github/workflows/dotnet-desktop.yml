# .github/workflows/build-tizen.yml
name: Build Jellyfin Tizen Client

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

permissions:
  contents: write          

jobs:
  build:
    name: Build TPK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 2. Install .NET 8 SDK ─────────────────────────────────────────────
      # ubuntu-latest now ships with .NET 10 pre-installed.
      # The Tizen workload manifest for 10.x doesn't exist on NuGet yet,
      # so we must force .NET 8 for everything in this job.
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # ── 3. Pin CLI to .NET 8 via global.json ──────────────────────────────
      # The Samsung install script calls `dotnet --version` to discover the
      # active SDK band. Without global.json it picks up .NET 10 (pre-installed
      # on the runner), which has no Tizen manifest on NuGet → bad zip error.
      # Writing global.json at the repo root pins the CLI to 8.x for every
      # subsequent `dotnet` command in this job.
      - name: Pin dotnet to 8.x via global.json
        run: |
          # Get the exact 8.x version that was just installed
          DOTNET8_VER=$(dotnet --list-sdks | grep '^8\.' | tail -1 | awk '{print $1}')
          echo "Pinning to .NET SDK: $DOTNET8_VER"
          cat > global.json << EOF
          {
            "sdk": {
              "version": "${DOTNET8_VER}",
              "rollForward": "patch"
            }
          }
          EOF
          cat global.json
          dotnet --version   # confirm pin is active

      # ── 4. Install Tizen Workload ─────────────────────────────────────────
      # Now that global.json forces the CLI to 8.x, the Samsung script will
      # correctly target the 8.0.x manifest band, which exists on NuGet.
      - name: Install Tizen Workload
        run: |
          curl -sSL https://raw.githubusercontent.com/Samsung/Tizen.NET/main/workload/scripts/workload-install.sh \
            | sudo bash

      # ── 5. Verify Workload ────────────────────────────────────────────────
      - name: Verify Tizen Workload installed
        run: dotnet workload list

      # ── 6. Restore ────────────────────────────────────────────────────────
      - name: Restore Dependencies
        run: |
          dotnet restore jellyfin.sln \
            --source https://api.nuget.org/v3/index.json \
            --source https://tizen.myget.org/F/dotnet/api/v3/index.json

      # ── 7. Build ──────────────────────────────────────────────────────────
      - name: Build Project
        run: |
          dotnet build jellyfin/jellyfin.csproj \
            -c ${{ github.event.inputs.configuration }} \
            --no-restore \
            -v minimal

      # ── 8. Locate TPK (debug helper) ──────────────────────────────────────
      - name: Find TPK files
        if: always()
        run: find jellyfin/bin -name "*.tpk" 2>/dev/null && echo "TPK found" || echo "No TPK found"

      # ── 9. Upload Artifact ────────────────────────────────────────────────
      - name: Upload TPK
        uses: actions/upload-artifact@v4
        with:
          name: jellyfin-tizen-${{ github.event.inputs.configuration }}-${{ github.run_number }}
          path: jellyfin/bin/${{ github.event.inputs.configuration }}/net6.0-tizen9.0/*.tpk
          if-no-files-found: warn
          retention-days: 30

            # ── 10. Create GitHub Release ─────────────────────────────────────────
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.date.outputs.date }}
          name: "jellyfin-dotnet"
          body: |
            ## Jellyfin Tizen Client

            **Configuration:** ${{ github.event.inputs.configuration }}
            **Date:** ${{ steps.date.outputs.date }}
            **Commit:** ${{ github.sha }}

            ### Installation
            1. Download the `.tpk` file below
            2. Install via Tizen Studio or `sdb install <file>.tpk`
          files: jellyfin/bin/${{ github.event.inputs.configuration }}/net6.0-tizen9.0/*.tpk
          draft: false
          prerelease: ${{ github.event.inputs.configuration == 'Debug' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}    
