name: Build Jellyfin Tizen

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        # Pinned to 8.0/9.0 because Tizen manifests for .NET 10 
        # feature bands (like 201) are often missing or broken.
        dotnet-version: 8.0.x 

    - name: Install Tizen Workload
      run: |
        # Use the official NuGet feed + the Tizen preview feed for the manifest
        # We run this with sudo to ensure it can write to the SDK folder
        sudo dotnet workload install tizen --source https://api.nuget.org/v3/index.json --source https://tizen.myget.org/F/dotnet/api/v3/index.json

    - name: Restore Dependencies
      run: dotnet restore jellyfin.sln

    - name: Build Project
      # Targeting your specific project and the Release configuration
      run: dotnet build jellyfin/jellyfin.csproj -c Release --no-restore

    - name: Upload TPK
      uses: actions/upload-artifact@v4
      with:
        name: jellyfin-tizen-package
        # This path matches your Tizen 9.0 (API 12) build output
        path: jellyfin/bin/Release/tizen90/*.tpk
