name: Build Tizen Client

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x # Or 8.0.x depending on your csproj

    - name: Install Tizen Workload Manifest
      run: |
        # Download the official Samsung helper script
        curl -sSL https://raw.githubusercontent.com/Samsung/Tizen.NET/main/workload/scripts/workload-install.sh -o workload-install.sh
        chmod +x workload-install.sh
        # Run the script to register and install the 'tizen' workload
        sudo ./workload-install.sh

    - name: Restore Dependencies
      run: dotnet restore jellyfin.sln

    - name: Build Project
      run: dotnet build jellyfin/jellyfin.csproj -c Release --no-restore

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tizen-tpk
        path: jellyfin/bin/Release/tizen90/*.tpk
