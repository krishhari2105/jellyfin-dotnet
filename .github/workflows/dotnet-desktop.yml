name: Build Tizen Client

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        # CRITICAL: Pin to 8.0 because Tizen manifests for .NET 10 are currently broken.
        dotnet-version: 8.0.x 

    - name: Install Tizen Workload
      run: |
        # Use the CLI directly. Note: Do NOT paste these into a browser.
        # We use sudo to ensure permission to write to the SDK folder.
        sudo dotnet workload install tizen --source https://api.nuget.org/v3/index.json --source https://tizen.myget.org/F/dotnet/api/v3/index.json

    - name: Restore Dependencies
      run: dotnet restore jellyfin.sln

    - name: Build Project
      # Targeting your specific project and the Release configuration
      run: dotnet build jellyfin/jellyfin.csproj -c Release --no-restore

    - name: Upload TPK
      uses: actions/upload-artifact@v4
      with:
        name: jellyfin-tizen-package
        # This path matches your Tizen 9.0 / API 12 target
        path: jellyfin/bin/Release/tizen90/*.tpk
